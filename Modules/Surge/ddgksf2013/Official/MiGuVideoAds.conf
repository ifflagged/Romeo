hostname= *.miguvideo.com, *.migu.cn

https://.*miguvideo\.com\/request\/sdk url reject-200
https://.*miguvideo\.com\/deliver\/site\/batchMatch\/mergeSpot\/miguvideo url reject-200
https://.*miguvideo\.com\/app-management\/v\d\/staticcache\/navigation-list\/miguvideo\/ios url script-response-body https://ddgksf2013.top/scripts/migu.ads.js
https://.*miguvideo\.com\/display\/v\d\/static\/PERSONAL_CENTER url script-response-body https://ddgksf2013.top/scripts/migu.ads.js
https://.*miguvideo\.com\/recommend-dynamic\/dataSource\/v\d\/recommend url jsonjq-response-body '.body.data=[]'
https://.*migu\.cn\/search\/hotword url jsonjq-response-body '.body={}'
